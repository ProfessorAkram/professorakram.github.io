# -----------------------------------------------------------------------------
# ⚙️ Site Settings
# -----------------------------------------------------------------------------

title: Professor Akram
email: akram-burris@utulsa.edu
description: >-
  A Master of Systemic Sorcery: Weaving the impossible creations of the 
  imagination into real-time experiences, controlling the entropy of 
  virtual worlds through the ancient art of Programming and Modular Systems Design.

# Branding & Social
twitter_username: ProfessorAkram 
github_username:  ProfessorAkram

# -----------------------------------------------------------------------------
# 🛠️ Build Settings
# -----------------------------------------------------------------------------

baseurl: "" 
url: "https://professorakram.github.io"

markdown: kramdown
remote_theme: "mmistakes/minimal-mistakes"
# Removed include: ["_pages"] to avoid collection conflicts

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-remote-theme
  - jekyll-include-cache
  - jekyll-paginate

# -----------------------------------------------------------------------------
# 🎨 Theme Settings
# -----------------------------------------------------------------------------

minimal_mistakes_skin: "default"
site_author: "Professor Akram"
paginate: 5
words_per_minute: 200

# Masthead (Top Navigation) Settings
logo: 
masthead_title: "Professor Akram"

# Defaults for Posts and Pages
defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      header:
        overlay_color: "#003595"
        overlay_image:    
      author_profile: true # Author profile (left sidebar) is visible
      toc: true             # Table of Contents (right sidebar) is visible
      toc_label: "Contents" # Optional: Custom title for the TOC
      toc_icon: "book"      # Optional: FontAwesome icon
      toc_sticky: true      # This makes it stick to the sidebar
  
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      header:
        overlay_color: "#003595"
        overlay_image: 
      author_profile: true # Author profile (left sidebar) is visible
      toc: true             # Table of Contents (right sidebar) is visible
      toc_label: "Contents" # Optional: Custom title for the TOC
      toc_icon: "book"      # Optional: FontAwesome icon
      toc_sticky: true      # This makes it stick to the sidebar
 
  - scope:
      path: ""
      type: portfolio # Matches the collection name above
    values:
      layout: portfolio-item
      header:
        overlay_color: "#003595"
        overlay_image:
      author_profile: true # Author profile (left sidebar) is visible
      sidebar: 
        nav: "portfolio_sidebar"  # Custom Portfolio (left sidebar) is visible
      toc: true # Table of Contents (right sidebar) is visible

include:
  - _pages
      
# -----------------------------------------------------------------------------
# 📂 Collections Settings 
# -----------------------------------------------------------------------------

collections:
  portfolio:
    output: true
    permalink: /portfolio/:path/

# -----------------------------------------------------------------------------
# 👤 Author Settings
# -----------------------------------------------------------------------------

author:
  name   : "Akram Taghavi-Burris"
  avatar : "/assets/images/2024-Akram.png"
  bio    : "<strong>Program Director & Professor of CSG</strong> <br> <em>Master of Systems Sorcery</em>"
  links:
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://www.linkedin.com/in/akram-taghavi-burris/"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/ProfessorAkram"  
    - label: "Itch.io"
      icon: "fab fa-fw fa-itch-io"
      url: "https://professorakram.itch.io"
    - label: "ArtStation"
      icon: "fab fa-fw fa-artstation"
      url: "https://www.artstation.com/your-profile"

# -----------------------------------------------------------------------------
# 🚫 Exclusions
# -----------------------------------------------------------------------------

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - .jekyll-cache
  - .jekyll-metadata